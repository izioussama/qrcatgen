<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoured Cat QR Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 800px;
            box-sizing: border-box;
        }
        h2 { text-align: center; color: #1f2937; margin-top: 0; }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4b5563;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
            outline: none;
        }
        .preview-area {
            text-align: center;
            margin-top: 25px;
            background: #fafafa;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #d1d5db;
        }
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .download-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .download-btn:hover { background: #1d4ed8; }
        .download-btn:active { background: #1e40af; }
        .status-message {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cat QR Generator</h2>
    
    <div class="form-group">
        <label for="qr-text">Enter URL or Text</label>
        <input type="text" id="qr-text" value="https://google.com">
    </div>

    <div class="preview-area">
        <canvas id="qr-canvas"></canvas>
    </div>

    <button class="download-btn" id="download-btn">Export QR Code</button>
    <div class="status-message" id="status-message"></div>
</div>

<script>
    const qrTextInput = document.getElementById('qr-text');
    const canvas = document.getElementById('qr-canvas');
    const downloadBtn = document.getElementById('download-btn');
    const statusMessage = document.getElementById('status-message');
    let isGenerating = false;

    // Automatically load the embedded asset from the root directory
    const catImage = new Image();
    catImage.src = 'cat1.png'; 

    // Re-render once the image asset finishes loading over the network/disk
    catImage.onload = function() {
        generateQR();
    };

    function generateQR() {
        if (isGenerating) return;
        isGenerating = true;
        statusMessage.textContent = 'Generating...';

        const text = qrTextInput.value.trim() || " ";
        
        // High (Level H) Error Correction provides a 30% data recovery cushion
        const options = {
            errorCorrectionLevel: 'H',
            margin: 4,
            width: 800, // Clean, high-res layout matrix
            color: {
                dark: '#000000',
                light: '#ffffff'
            }
        };

        QRCode.toCanvas(canvas, text, options, function (error) {
            isGenerating = false;
            statusMessage.textContent = '';

            if (error) {
                console.error(error);
                statusMessage.textContent = 'Error generating QR code';
                return;
            }

            // Fallback safety if image isn't available
            if (!catImage.complete || catImage.naturalWidth === 0) {
                statusMessage.textContent = 'Cat image not loaded yet';
                return;
            }

            const ctx = canvas.getContext('2d');
            const canvasSize = canvas.width;

            // Silhouette scaling setup (keeps cat safe within 24% threshold)
            const maxOverlaySize = canvasSize * 0.55;
            let overlayWidth = maxOverlaySize;
            let overlayHeight = maxOverlaySize;

            if (catImage.width > catImage.height) {
                overlayHeight = maxOverlaySize * (catImage.height / catImage.width);
            } else {
                overlayWidth = maxOverlaySize * (catImage.width / catImage.height);
            }

            const x = (canvasSize - overlayWidth) / 2;
            const y = (canvasSize - overlayHeight) / 2;

            // --- ADVANCED CONTOUR MASKING ---
            ctx.save();
            
            // Turn the black png silhouette into a solid white masking stamp
            ctx.filter = 'brightness(0) invert(1)';
            
            // Outer contour stroke thickness (in pixels). Increase to clear more space around ears/tail.
            const maskThickness = 6; 
            
            // Sweep 360 degrees to stamp a perfectly matched white border around the cat shape
            for (let angle = 0; angle < 360; angle += 45) {
                const dx = Math.cos(angle * Math.PI / 180) * maskThickness;
                const dy = Math.sin(angle * Math.PI / 180) * maskThickness;
                ctx.drawImage(catImage, x + dx, y + dy, overlayWidth, overlayHeight);
            }
            
            ctx.restore(); // Instantly drops the white color filters back to normal
            // --------------------------------

            // Draw your original cat silhouette exactly inside the freshly cleared custom boundary
            ctx.drawImage(catImage, x, y, overlayWidth, overlayHeight);
            statusMessage.textContent = 'Ready to download!';
        });
    }

    // Live update loop as you type
    qrTextInput.addEventListener('input', generateQR);

    // Instant PNG exporter - FIXED
    downloadBtn.addEventListener('click', function(e) {
        e.preventDefault();
        
        // Check if canvas has content
        if (canvas.width === 0 || canvas.height === 0) {
            statusMessage.textContent = 'Please wait for QR code to generate';
            return;
        }

        try {
            const link = document.createElement('a');
            link.download = 'contoured-cat-qr.png';
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            statusMessage.textContent = 'Downloaded!';
            setTimeout(() => { statusMessage.textContent = 'Ready to download!'; }, 2000);
        } catch (error) {
            console.error('Download error:', error);
            statusMessage.textContent = 'Error downloading QR code';
        }
    });

    // Generate initial QR code on page load
    if (catImage.complete) {
        generateQR();
    }
</script>

</body>
</html>
